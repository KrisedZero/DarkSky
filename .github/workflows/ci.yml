name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    name: Import & Validate (Godot ${{ env.GODOT_VERSION }})
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: "4.4"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Godot headless
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" godot
          chmod +x godot

      - name: Import project (validates all resources)
        run: |
          ./godot --headless --path . --import 2>&1 | tee import.log
          if grep -Ei "SCRIPT ERROR|Parse Error|ERROR:.*\.gd" import.log; then
            echo "::error::Script or parse errors detected during import."
            exit 1
          fi

      - name: Headless boot check
        run: |
          timeout 30 ./godot --headless --path . --quit-after 60 2>&1 | tee run.log || true
          if grep -Ei "SCRIPT ERROR|Parse Error" run.log; then
            echo "::error::Runtime script errors detected."
            exit 1
          fi

  lint:
    name: GDScript Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install gdtoolkit
        run: pip install "gdtoolkit==4.*"

      - name: Lint GDScript
        run: gdlint scripts/

      - name: Format check
        run: gdformat --check scripts/
